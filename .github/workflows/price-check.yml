name: 比价鹰 - 定时价格检查

on:
  # 每 4 小时自动运行一次（可调整）
  schedule:
    - cron: '0 */4 * * *'
  # 也支持手动触发
  workflow_dispatch:

jobs:
  price-check:
    runs-on: ubuntu-latest
    # 赋予写入仓库的权限
    permissions:
      contents: write
    # 使用中国镜像加速（可选）
    # runs-on: ubuntu-22.04

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          # 需要写入权限来保存价格历史
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml pyyaml pydantic playwright

      - name: 安装 Playwright 浏览器
        run: |
          python -m playwright install chromium

      - name: 运行比价引擎
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python -m src.main

      - name: 提交价格历史数据
        run: |
          git config --local user.email "pricehawk@bot.com"
          git config --local user.name "PriceHawk Bot"
          git add data/
          # 如果有变更才提交
          git diff --quiet && git diff --staged --quiet || git commit -m "📊 自动更新价格历史 $(date +'%Y-%m-%d %H:%M')"
          # 强制推送（价格历史是追加数据，安全）
          git push --force
